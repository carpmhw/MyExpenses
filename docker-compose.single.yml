services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.single
    ports:
      - "80:80"
    volumes:
      - myexpenses-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/MyExpenses.db
      - Auth__CookieSecure=false
      - TZ=Asia/Taipei

volumes:
  myexpenses-data:
