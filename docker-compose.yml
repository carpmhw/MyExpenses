services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - myexpenses-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/MyExpenses.db
      - Auth__CookieSecure=false
      - TZ=Asia/Taipei

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Taipei
    depends_on:
      - backend

volumes:
  myexpenses-data:
